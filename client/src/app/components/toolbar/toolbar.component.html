<header class="toolbar" role="banner">
  <!-- Left: app branding -->
  <div class="toolbar-left">
    <a class="app-brand" href="/app" title="FreeCord Home" aria-label="FreeCord Home">
      <span class="app-logo" aria-hidden="true">FC</span>
      <span class="app-name">FreeCord</span>
    </a>
  </div>

  <!-- Center: search (placeholder for future backend search) -->
  <div class="toolbar-center">
    <div class="search-wrap" role="search">
      <button
        type="button"
        class="search-trigger"
        (click)="onSearch()"
        aria-label="Search messages and channels"
        title="Search (coming soon)"
      >
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <span class="search-placeholder">Search</span>
      </button>
    </div>
  </div>

  <!-- Right: admin (when server admin), notifications, help, user menu -->
  <div class="toolbar-right">
    @if (isServerAdmin()) {
      <a
        routerLink="/app/admin/settings"
        class="toolbar-icon-btn"
        title="Server settings"
        aria-label="Server settings"
      >
        <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </a>
    }
    <button
      type="button"
      class="toolbar-icon-btn"
      (click)="onNotifications()"
      aria-label="Notifications"
      title="Notifications (coming soon)"
    >
      <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </button>
    <button
      type="button"
      class="toolbar-icon-btn"
      (click)="onHelp()"
      aria-label="Help"
      title="Help (coming soon)"
    >
      <svg class="toolbar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
        <path d="M12 17h.01"/>
      </svg>
    </button>

    <!-- User menu: avatar + username, dropdown -->
    <div class="user-menu-wrap">
      <button
        type="button"
        class="user-menu-trigger"
        (click)="toggleUserMenu()"
        [attr.aria-expanded]="userMenuOpen()"
        aria-haspopup="true"
        aria-label="User menu"
      >
        <span class="user-avatar" aria-hidden="true">{{ (username() || 'U').charAt(0).toUpperCase() }}</span>
        <span class="user-name">{{ username() || 'User' }}</span>
        <svg class="user-menu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.open]="userMenuOpen()" aria-hidden="true">
          <path d="m6 9 6 6 6-6"/>
        </svg>
      </button>

      @if (userMenuOpen()) {
        <div class="user-menu-dropdown" role="menu">
          <button type="button" class="user-menu-item" role="menuitem" (click)="onOpenThemeSettings()">
            <svg class="user-menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            Theme settings
          </button>
          <button type="button" class="user-menu-item user-menu-item-danger" role="menuitem" (click)="logout()">
            <svg class="user-menu-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Log out
          </button>
        </div>
      }
    </div>
  </div>
</header>
