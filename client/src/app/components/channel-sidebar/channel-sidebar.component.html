<div class="channel-sidebar-content">
  <header class="channel-sidebar-header">
    <h2 class="guild-name">{{ currentGuildName }}</h2>
  </header>

  <nav class="channel-list">
    <div class="channel-group">
      <span class="channel-group-label">Text Channels</span>
      @for (channel of channels; track channel.id) {
        @if (channel.type === 'text') {
          <a
            [routerLink]="['/app', 'channel', channel.id]"
            routerLinkActive="active"
            class="channel-item"
            [attr.title]="channel.name"
          >
            <span class="channel-icon">#</span>
            <span class="channel-name">{{ channel.name }}</span>
          </a>
        }
      }
    </div>
    <div class="channel-group">
      <span class="channel-group-label">Voice Channels</span>
      @for (channel of channels; track channel.id) {
        @if (channel.type === 'voice') {
          <button
            type="button"
            class="channel-item channel-item-voice"
            [class.active]="voiceRoom.isInVoiceChannel() && voiceRoom.currentChannelId() === channel.id"
            [disabled]="joiningVoice"
            [attr.title]="channel.name"
            (click)="onVoiceChannelClick(channel.id)"
          >
            <span class="channel-icon">🔊</span>
            <span class="channel-name">{{ channel.name }}</span>
            @if (voiceRoom.isInVoiceChannel() && voiceRoom.currentChannelId() === channel.id) {
              <span class="channel-voice-status">● Connected</span>
            }
          </button>
        }
      }
    </div>
    @if (voiceError) {
      <p class="channel-voice-error">{{ voiceError }}</p>
    }
  </nav>
</div>
