<div class="chat-container">
  <header class="chat-header">
    <span class="chat-channel-icon">#</span>
    <h1 class="chat-channel-name">{{ channelName }}</h1>
  </header>

  <div class="message-list">
    @for (msg of messages(); track msg.id) {
      <div class="message">
        <span class="message-author">{{ msg.authorUsername }}</span>
        <span class="message-content">{{ msg.content }}</span>
        <span class="message-time">{{ msg.createdAt | date : 'short' }}</span>
      </div>
    } @empty {
      <div class="message-empty">No messages yet. Start the conversation!</div>
    }
  </div>

  <div class="chat-input-area">
    <input
      type="text"
      placeholder="Type a message..."
      class="chat-input"
      (keydown.enter)="$event.preventDefault()"
    />
  </div>
</div>
